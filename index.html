<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Studio — Lecteur Audio</title>

    <!--
      Composants autonomes.
      Pour utiliser des composants hébergés sur un dépôt distant, remplacer
      les chemins relatifs ci-dessous par les URLs absolues correspondantes.

      Attributs HTML disponibles :
        <my-audio-player src="URL/tracks.json" [autoplay]>
        <my-eq preset="-3,0,2,4,0,-2">
        <my-waveform color="#39e082" fft-size="1024" mode="waveform|spectrum">
        <my-butterchurn blend="2.0">
    -->
    <script type="module" src="./components/audioplayer.js"></script>
    <script type="module" src="./components/Playlist.js"></script>
    <script type="module" src="./components/equalizer.js"></script>
    <script type="module" src="./components/waveform.js"></script>
    <script type="module" src="./components/butterchurn.js"></script>

    <!-- Câblage de la chaîne audio : player → eq → waveform → butterchurn → destination -->
    <script type="module">
        await Promise.all([
            customElements.whenDefined('my-audio-player'),
            customElements.whenDefined('my-eq'),
            customElements.whenDefined('my-waveform'),
            customElements.whenDefined('my-butterchurn'),
        ]);
        const player      = document.querySelector('#player');
        const eq          = document.querySelector('#eq');
        const waveform    = document.querySelector('#waveform');
        const butterchurn = document.querySelector('#butterchurn');
        player.connectComponent(eq);
        eq.connectComponent(waveform);
        waveform.connectComponent(butterchurn);
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Layout sans script.js : flux flexbox au lieu de position absolue */
        body { overflow: auto; }
        main {
            position: static;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
        }
        .window {
            position: static;
            width: 340px;
        }
        #win-waveform, #win-butterchurn {
            flex: 1;
            min-width: 300px;
        }
        #win-butterchurn { min-width: 340px; }
        #win-playlist    { min-height: 220px; }
    </style>
</head>

<body>
<main>
    <div class="window" id="win-player" data-no-resize>
        <div class="titlebar"><span class="titlebar-dot"></span>PLAYER</div>
        <my-audio-player id="player" src="./assets/tracks.json"></my-audio-player>
    </div>
    <div class="window" id="win-playlist">
        <div class="titlebar"><span class="titlebar-dot"></span>PLAYLIST</div>
        <my-playlist id="playlist"></my-playlist>
    </div>
    <div class="window" id="win-eq" data-no-resize>
        <div class="titlebar"><span class="titlebar-dot"></span>EQUALIZER</div>
        <my-eq id="eq" preset="0,0,0,0,0,0"></my-eq>
    </div>
    <div class="window" id="win-waveform">
        <div class="titlebar"><span class="titlebar-dot"></span>WAVEFORM</div>
        <my-waveform id="waveform" color="#39e082" fft-size="1024"></my-waveform>
    </div>
    <div class="window" id="win-butterchurn">
        <div class="titlebar"><span class="titlebar-dot"></span>VISUALIZER</div>
        <my-butterchurn id="butterchurn"></my-butterchurn>
    </div>
</main>
</body>

</html>
